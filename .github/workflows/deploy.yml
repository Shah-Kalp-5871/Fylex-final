name: Deploy Fylex System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e  # Exit immediately on any error
            echo "========================================="
            echo "🚀 Starting Fylex System Deployment..."
            echo "========================================="

            # ── PULL MAIN REPO ─────────────────────────────────────────────
            echo "📥 Pulling latest changes from the main repo..."
            cd /home/fylex
            git pull origin main

            # ── BACKEND (NEST) ─────────────────────────────────────────────
            echo "⚙️  Deploying Backend..."
            cd /home/fylex/nest_

            echo "📦 Installing backend dependencies..."
            npm install --frozen-lockfile

            echo "🗄️  Generating Prisma Client & Running Migrations..."
            npx prisma generate
            npx prisma migrate deploy

            echo "🔨 Building backend..."
            npm run build

            echo "♻️  Restarting backend service..."
            pm2 restart fylex-backend --update-env || pm2 start dist/src/main.js --name "fylex-backend"

            # ── FRONTEND (NEXT) ────────────────────────────────────────────
            echo "🎨 Deploying Frontend..."
            cd /home/fylex/next_

            echo "📦 Installing frontend dependencies..."
            npm install --frozen-lockfile

            echo "🔨 Building frontend..."
            npm run build

            echo "♻️  Restarting frontend service..."
            pm2 delete fylex-frontend || true
            pm2 start node_modules/next/dist/bin/next --name "fylex-frontend" -- start -p 3003 -H 0.0.0.0

            # ── PERSIST PM2 STATE ──────────────────────────────────────────
            echo "💾 Saving PM2 process list..."
            pm2 save

            # ── DONE ───────────────────────────────────────────────────────
            echo "========================================="
            echo "✅ Deployment successful!"
            echo "   Backend : http://187.127.131.26/api"
            echo "   Frontend: http://187.127.131.26"
            echo "========================================="
