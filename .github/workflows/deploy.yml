name: Deploy Fylex System

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e  # Exit immediately on any error
            echo "========================================="
            echo "🚀 Starting Fylex System Deployment..."
            echo "========================================="

            # ── PULL MAIN REPO ─────────────────────────────────────────────
            echo "📥 Pulling latest changes from the main repo..."
            cd /home/fylex
            git pull origin main

            # ── BACKEND (NEST) ─────────────────────────────────────────────
            echo "⚙️  Deploying Backend..."
            cd /home/fylex/nest_
            echo "📦 Installing backend dependencies..."
            npm install
            echo "🗄️  Generating Prisma Client & Running Migrations..."
            npx prisma generate
            npx prisma migrate deploy
            echo "🔨 Building backend..."
            npm run build
            echo "♻️  Restarting backend service..."
            # Using dist/src/main.js as per your Nest build output
            pm2 restart fylex-backend || pm2 start dist/src/main.js --name "fylex-backend"

            # ── FRONTEND (NEXT) ────────────────────────────────────────────
            echo "🎨 Deploying Frontend..."
            cd /home/fylex/next_
            echo "📦 Installing frontend dependencies..."
            npm install
            echo "🔨 Building frontend..."
            npm run build
            echo "♻️  Restarting frontend service..."
            # Running next binary directly to avoid NPM ghost processes
            pm2 restart fylex-frontend || pm2 start node_modules/next/dist/bin/next --name "fylex-frontend" -- start -p 3002

            # ── DONE ───────────────────────────────────────────────────────
            echo "========================================="
            echo "✅ Deployment successful!"
            echo "   Backend : pm2 status fylex-backend"
            echo "   Frontend: pm2 status fylex-frontend"
            echo "========================================="
